name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  quality:
    name: Lint, TypeScript, Tests, Build
    runs-on: ubuntu-latest

    env:
      HUSKY: 0
      NEXT_PUBLIC_SANITY_PROJECT_ID: id5e9a8v
      NEXT_PUBLIC_SANITY_DATASET: production
      NEXT_PUBLIC_SANITY_API_VERSION: 2025-01-01
      NEXT_PUBLIC_TURNSTILE_SITEKEY: 0x4AAAAAADkJRVyecYwa2q7f

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
