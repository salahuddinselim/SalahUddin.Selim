name: Lighthouse CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  lhci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run Lighthouse CI
        run: npm run lhci
